name: Release

on:
  push:
    branches:
      - main
      - main-**

jobs:
  release-please:
    name: Create or update release PR
    runs-on: ubuntu-latest

    permissions:
      contents: write       # push tags, create releases, update CHANGELOG
      pull-requests: write  # open and update the release PR

    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4.1.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: simple

  # Optional: anything that should only run after a real release is cut
  # (e.g. triggering a prod deployment, posting a Slack notification, etc.)
  post-release:
    name: Post-release steps
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'

    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      # Add any post-release steps here, for example:
      #   - name: Notify Slack
      #     run: |
      #       curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
      #         -d "{\"text\":\"Released ${{ needs.release-please.outputs.tag_name }}\"}"