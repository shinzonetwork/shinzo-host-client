# This workflow will run 'go test' on the project when creating a PR (or trying to push to) main
name: Go Lint CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v7

    - name: Set up Go
      uses: actions/setup-go@v7
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Get CPU count
      id: cpu
      run: echo "count=$(nproc 2>/dev/null || sysctl -n hw.ncpu || echo 2)" >> $GITHUB_OUTPUT
    
    - name: Linting - golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.12.2