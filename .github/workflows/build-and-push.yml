name: Build and Push

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: build-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: shinzonetwork/shinzo-host-client

jobs:
  # Job 1: Build and push image (standard)
  build-and-push-standard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      short_sha: ${{ steps.short_sha.outputs.sha }}
    steps:
      - uses: actions/checkout@v6

      - name: Get short SHA
        id: short_sha
        run: echo "sha=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.short_sha.outputs.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:standard
          build-args: |
            TAGS=hostplayground
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache-filters: build

 # Job 2: Build summary
  build-summary:
    needs: [build-and-push-standard] 
    runs-on: ubuntu-latest
    env:
      SHORT_SHA_STANDARD: ${{ needs.build-and-push-standard.outputs.short_sha }}
      COMMIT: ${{ github.sha }}
    steps:
      - name: Build summary
        env:
          SHORT_SHA_STANDARD: ${{ needs.build-and-push-standard.outputs.short_sha }}
          COMMIT: ${{ github.sha }}
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Build Type | Image Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Standard | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-$SHORT_SHA_STANDARD\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`$COMMIT\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔄 **Watchtower** will auto-deploy within ~5 minutes" >> $GITHUB_STEP_SUMMARY
