# This workflow will run 'go test' on the project when creating a PR (or trying to push to) main
name: Go Test CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Check out code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'

    - name: Cache Go build
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Linting - golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.12.2

    - name: Download test WASM file
      run: |
        curl -o /tmp/filter_transaction.wasm \
          https://github.com/shinzonetwork/wasm-bucket/raw/refs/heads/main/bucket/filter_transaction/filter_transaction.wasm

    - name: Run tests
      env:
        GCP_GETH_RPC_URL: ${{ secrets.GCP_GETH_RPC_URL }}
        GCP_GETH_WS_URL: ${{ secrets.GCP_GETH_WS_URL }}
        GCP_GETH_API_KEY: ${{ secrets.GCP_GETH_API_KEY }}
      run: |
        go test -count=1 -timeout=3m \
          -covermode=atomic \
          -coverprofile=coverage.out \
          ./pkg/...
    
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v7
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: shinzonetwork/shinzo-host-client
        files: coverage.out
        fail_ci_if_error: true
